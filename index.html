<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>තෙම්පරාදුව (Themparaduwa) - Premium Sri Lankan Homemade Food</title>
    <meta name="description" content="Premium homemade Sri Lankan food. Delicious chili pastes, cutlets, rolls, and sandwiches made with love.">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --rich-red: #8B0000;
            --deep-red: #5C0011;
            --luxury-gold: #D4AF37;
            --light-gold: #F4E4BC;
            --dark-black: #0a0a0a;
            --card-black: #111111;
            --text-gray: #b0b0b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
            background: var(--dark-black);
            color: #fff;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-black); }
        ::-webkit-scrollbar-thumb { background: var(--luxury-gold); border-radius: 4px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px var(--luxury-gold), 0 0 10px var(--luxury-gold); }
            50% { box-shadow: 0 0 20px var(--luxury-gold), 0 0 30px var(--luxury-gold); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .fade-in { animation: fadeInUp 0.8s ease-out forwards; }
        .glow-effect { animation: glow 2s ease-in-out infinite; }
        .float-animation { animation: float 3s ease-in-out infinite; }

        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 1000; padding: 15px 0;
            transition: all 0.3s ease; background: transparent;
        }
        .navbar.scrolled {
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto; padding: 0 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700;
            color: var(--luxury-gold); text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }
        .logo i { color: var(--rich-red); }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a {
            color: #fff; text-decoration: none; font-size: 0.95rem; font-weight: 500;
            transition: color 0.3s; position: relative;
        }
        .nav-links a:hover { color: var(--luxury-gold); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px;
            background: var(--luxury-gold); transition: width 0.3s;
        }
        .nav-links a:hover::after { width: 100%; }
        .lang-toggle {
            background: linear-gradient(135deg, var(--rich-red), var(--deep-red));
            border: 1px solid var(--luxury-gold); color: var(--luxury-gold);
            padding: 8px 20px; border-radius: 25px; cursor: pointer;
            font-weight: 600; transition: all 0.3s;
        }
        .lang-toggle:hover { background: var(--luxury-gold); color: var(--dark-black); }
        .mobile-menu-btn {
            display: none; background: none; border: none;
            color: var(--luxury-gold); font-size: 1.5rem; cursor: pointer;
        }

        .hero {
            min-height: 100vh; position: relative; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(139,0,0,0.3), rgba(10,10,10,0.9)),
                        url('https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=1920&q=80') center/cover;
            filter: brightness(0.4);
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(10,10,10,0.8) 70%);
        }
        .hero-content {
            position: relative; z-index: 2; text-align: center;
            padding: 0 20px; max-width: 900px;
        }
        .hero-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--rich-red), var(--deep-red));
            color: var(--light-gold); padding: 10px 30px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 600; margin-bottom: 30px;
            border: 1px solid var(--luxury-gold); animation: fadeInUp 0.8s ease-out;
        }
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 800;
            color: var(--luxury-gold); margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        .hero-subtitle-si {
            font-family: 'Noto Sans Sinhala', sans-serif;
            font-size: clamp(1.2rem, 3vw, 2rem); color: #fff;
            margin-bottom: 10px; font-weight: 500;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        .hero-subtitle-en {
            font-size: clamp(1rem, 2vw, 1.3rem); color: var(--text-gray);
            margin-bottom: 40px; font-weight: 300;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }
        .hero-buttons {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }
        .btn {
            padding: 15px 35px; border-radius: 50px; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: all 0.3s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px; border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--rich-red), var(--deep-red));
            color: #fff; border: 2px solid var(--luxury-gold);
        }
        .btn-primary:hover {
            background: var(--luxury-gold); color: var(--dark-black);
            transform: translateY(-3px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
        .btn-secondary {
            background: transparent; color: var(--luxury-gold);
            border: 2px solid var(--luxury-gold);
        }
        .btn-secondary:hover {
            background: var(--luxury-gold); color: var(--dark-black); transform: translateY(-3px);
        }
        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff; border: 2px solid #25D366;
        }
        .btn-whatsapp:hover {
            background: #25D366; transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }
        .particles {
            position: absolute; width: 100%; height: 100%;
            overflow: hidden; z-index: 1;
        }
        .particle {
            position: absolute; width: 4px; height: 4px;
            background: var(--luxury-gold); border-radius: 50%;
            opacity: 0.5; animation: float 4s ease-in-out infinite;
        }

        .section { padding: 100px 20px; max-width: 1400px; margin: 0 auto; }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3rem); color: var(--luxury-gold);
            text-align: center; margin-bottom: 15px; position: relative;
        }
        .section-title::after {
            content: ''; display: block; width: 80px; height: 3px;
            background: linear-gradient(90deg, transparent, var(--luxury-gold), transparent);
            margin: 15px auto;
        }
        .section-subtitle {
            text-align: center; color: var(--text-gray); font-size: 1.1rem;
            margin-bottom: 60px; max-width: 600px; margin-left: auto; margin-right: auto;
        }

        .about-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
        }
        .about-image {
            position: relative; border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .about-image img {
            width: 100%; height: 500px; object-fit: cover; transition: transform 0.5s;
        }
        .about-image:hover img { transform: scale(1.05); }
        .about-image::before {
            content: ''; position: absolute; top: -10px; left: -10px;
            right: 10px; bottom: 10px; border: 2px solid var(--luxury-gold);
            border-radius: 20px; z-index: -1;
        }
        .about-content h3 {
            font-family: 'Playfair Display', serif; font-size: 2rem;
            color: var(--luxury-gold); margin-bottom: 20px;
        }
        .about-content p {
            color: var(--text-gray); line-height: 1.8; margin-bottom: 20px; font-size: 1.05rem;
        }
        .feature-cards {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px;
        }
        .feature-card {
            background: var(--card-black); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px; padding: 25px; transition: all 0.3s;
        }
        .feature-card:hover {
            border-color: var(--luxury-gold); transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }
        .feature-card i { font-size: 2rem; color: var(--luxury-gold); margin-bottom: 15px; }
        .feature-card h4 { color: #fff; margin-bottom: 10px; font-size: 1.1rem; }
        .feature-card p { color: var(--text-gray); font-size: 0.9rem; margin: 0; }

        .menu-filters {
            display: flex; justify-content: center; gap: 15px;
            margin-bottom: 50px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 25px; background: var(--card-black);
            border: 1px solid rgba(212, 175, 55, 0.3); color: var(--text-gray);
            border-radius: 25px; cursor: pointer; transition: all 0.3s; font-weight: 500;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, var(--rich-red), var(--deep-red));
            color: #fff; border-color: var(--luxury-gold);
        }
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;
        }
        .menu-card {
            background: var(--card-black); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.15); transition: all 0.4s; position: relative;
        }
        .menu-card:hover {
            transform: translateY(-10px); border-color: var(--luxury-gold);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
        }
        .menu-card-image {
            height: 220px; overflow: hidden; position: relative;
        }
        .menu-card-image img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s;
        }
        .menu-card:hover .menu-card-image img { transform: scale(1.1); }
        .menu-card-badge {
            position: absolute; top: 15px; right: 15px;
            background: linear-gradient(135deg, var(--rich-red), var(--deep-red));
            color: #fff; padding: 5px 15px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600;
        }
        .menu-card-content { padding: 25px; }
        .menu-card-name-si {
            font-family: 'Noto Sans Sinhala', sans-serif; font-size: 1.3rem;
            color: #fff; margin-bottom: 5px;
        }
        .menu-card-name-en {
            color: var(--luxury-gold); font-size: 0.95rem;
            margin-bottom: 10px; font-weight: 500;
        }
        .menu-card-desc {
            color: var(--text-gray); font-size: 0.9rem;
            line-height: 1.6; margin-bottom: 15px;
        }
        .menu-card-footer {
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-card-price { font-size: 1.4rem; font-weight: 700; color: var(--luxury-gold); }
        .menu-card-order {
            background: linear-gradient(135deg, var(--rich-red), var(--deep-red));
            color: #fff; border: none; padding: 10px 25px;
            border-radius: 25px; cursor: pointer; font-weight: 600;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .menu-card-order:hover {
            background: var(--luxury-gold); color: var(--dark-black); transform: scale(1.05);
        }

        .catering-section {
            background: linear-gradient(135deg, rgba(139,0,0,0.1), rgba(10,10,10,0.9));
            border-radius: 30px; padding: 80px 40px; text-align: center;
            position: relative; overflow: hidden;
        }
        .catering-section::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://images.unsplash.com/photo-1555244162-80379f50736b?w=1200&q=80') center/cover;
            opacity: 0.1;
        }
        .catering-content { position: relative; z-index: 1; }
        .catering-text-si {
            font-family: 'Noto Sans Sinhala', sans-serif;
            font-size: clamp(1.5rem, 3vw, 2.2rem); color: #fff; margin-bottom: 15px;
        }
        .catering-text-en {
            font-size: clamp(1rem, 2vw, 1.3rem); color: var(--text-gray); margin-bottom: 40px;
        }
        .event-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px; max-width: 900px; margin: 0 auto;
        }
        .event-card {
            background: rgba(17, 17, 17, 0.8); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px; padding: 30px 20px; transition: all 0.3s;
        }
        .event-card:hover {
            border-color: var(--luxury-gold); transform: translateY(-5px);
            background: rgba(139, 0, 0, 0.2);
        }
        .event-card i { font-size: 2.5rem; color: var(--luxury-gold); margin-bottom: 15px; }
        .event-card h4 { color: #fff; font-size: 1.1rem; }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }
        .gallery-item {
            position: relative; border-radius: 15px; overflow: hidden;
            cursor: pointer; aspect-ratio: 1;
        }
        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s;
        }
        .gallery-item:hover img { transform: scale(1.15); }
        .gallery-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(139,0,0,0.8), transparent);
            display: flex; align-items: flex-end; padding: 20px;
            opacity: 0; transition: opacity 0.3s;
        }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        .gallery-overlay-text { color: #fff; font-weight: 600; }

        .order-section {
            background: linear-gradient(135deg, rgba(139,0,0,0.15), rgba(10,10,10,0.95));
            border-radius: 30px; padding: 80px 40px;
        }
        .order-form { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block; color: var(--luxury-gold);
            margin-bottom: 10px; font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 15px 20px; background: var(--card-black);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 10px;
            color: #fff; font-size: 1rem; transition: all 0.3s; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: var(--luxury-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .submit-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff; border: none; border-radius: 50px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center;
            justify-content: center; gap: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3);
        }

        .contact-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px; max-width: 1000px; margin: 0 auto;
        }
        .contact-card {
            background: var(--card-black); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px; padding: 40px 30px; text-align: center;
            transition: all 0.3s; text-decoration: none; color: inherit; display: block;
        }
        .contact-card:hover {
            border-color: var(--luxury-gold); transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.1);
        }
        .contact-card i { font-size: 2.5rem; color: var(--luxury-gold); margin-bottom: 20px; }
        .contact-card h4 { color: #fff; margin-bottom: 10px; font-size: 1.2rem; }
        .contact-card p { color: var(--text-gray); font-size: 1rem; }

        .footer {
            background: #050505; border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding: 60px 20px 30px;
        }
        .footer-content {
            max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 40px; margin-bottom: 40px;
        }
        .footer-brand h3 {
            font-family: 'Playfair Display', serif; color: var(--luxury-gold);
            font-size: 1.8rem; margin-bottom: 15px;
        }
        .footer-brand p { color: var(--text-gray); line-height: 1.7; }
        .footer-links h4 {
            color: var(--luxury-gold); margin-bottom: 20px; font-size: 1.1rem;
        }
        .footer-links a {
            display: block; color: var(--text-gray); text-decoration: none;
            margin-bottom: 12px; transition: color 0.3s;
        }
        .footer-links a:hover { color: var(--luxury-gold); }
        .social-links {
            display: flex; gap: 15px; margin-top: 20px;
        }
        .social-links a {
            width: 45px; height: 45px; border-radius: 50%; background: var(--card-black);
            border: 1px solid rgba(212, 175, 55, 0.3); display: flex; align-items: center;
            justify-content: center; color: var(--luxury-gold); font-size: 1.2rem;
            transition: all 0.3s; text-decoration: none;
        }
        .social-links a:hover {
            background: var(--luxury-gold); color: var(--dark-black); transform: translateY(-3px);
        }
        .footer-bottom {
            text-align: center; padding-top: 30px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            color: var(--text-gray); font-size: 0.9rem;
        }

        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: #fff; font-size: 1.8rem;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
            cursor: pointer; z-index: 999; transition: all 0.3s;
            text-decoration: none; animation: pulse 2s infinite;
        }
        .whatsapp-float:hover {
            transform: scale(1.1); box-shadow: 0 8px 30px rgba(37, 211, 102, 0.6);
        }

        .admin-trigger {
            position: fixed; bottom: 30px; left: 30px;
            width: 50px; height: 50px; background: var(--card-black);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--luxury-gold); cursor: pointer; z-index: 998;
            transition: all 0.3s; opacity: 0.5;
        }
        .admin-trigger:hover { opacity: 1; background: var(--rich-red); color: #fff; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--card-black); border: 1px solid var(--luxury-gold);
            border-radius: 20px; padding: 40px; max-width: 500px; width: 100%; position: relative;
        }
        .modal-close {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none; color: var(--luxury-gold);
            font-size: 1.5rem; cursor: pointer;
        }
        .modal-title {
            font-family: 'Playfair Display', serif; color: var(--luxury-gold);
            font-size: 1.8rem; margin-bottom: 30px; text-align: center;
        }
        .admin-dashboard {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--dark-black); z-index: 3000; overflow-y: auto;
        }
        .admin-header {
            background: linear-gradient(135deg, var(--rich-red), var(--deep-red));
            padding: 20px 40px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .admin-header h2 { color: var(--luxury-gold); font-family: 'Playfair Display', serif; }
        .admin-close {
            background: none; border: 2px solid var(--luxury-gold);
            color: var(--luxury-gold); padding: 10px 25px;
            border-radius: 25px; cursor: pointer; font-weight: 600;
            transition: all 0.3s;
        }
        .admin-close:hover { background: var(--luxury-gold); color: var(--dark-black); }
        .admin-body { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .admin-tabs {
            display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .admin-tab {
            padding: 12px 25px; background: var(--card-black);
            border: 1px solid rgba(212, 175, 55, 0.3); color: var(--text-gray);
            border-radius: 10px; cursor: pointer; transition: all 0.3s; font-weight: 500;
        }
        .admin-tab:hover, .admin-tab.active {
            background: linear-gradient(135deg, var(--rich-red), var(--deep-red));
            color: #fff; border-color: var(--luxury-gold);
        }
        .admin-panel {
            background: var(--card-black); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px; padding: 30px;
        }
        .admin-form-group { margin-bottom: 20px; }
        .admin-form-group label {
            display: block; color: var(--luxury-gold);
            margin-bottom: 8px; font-weight: 500;

                                            <img src={item.image} alt={item.nameEn} />
                                            <div className="admin-menu-item-info">
                                                {editingItem?.id === item.id ? (
                                                    <div style={{display: 'grid', gap: '10px'}}>
                                                        <input value={editingItem.nameSi} onChange={e => setEditingItem({...editingItem, nameSi: e.target.value})} />
                                                        <input value={editingItem.nameEn} onChange={e => setEditingItem({...editingItem, nameEn: e.target.value})} />
                                                        <input type="number" value={editingItem.price} onChange={e => setEditingItem({...editingItem, price: e.target.value})} />
                                                        <input value={editingItem.image} onChange={e => setEditingItem({...editingItem, image: e.target.value})} />
                                                    </div>
                                                ) : (
                                                    <>
                                                        <h4>{item.nameSi} ({item.nameEn})</h4>
                                                        <p>Rs. {item.price} | {item.category}</p>
                                                    </>
                                                )}
                                            </div>
                                            <div className="admin-menu-actions">
                                                {editingItem?.id === item.id ? (
                                                    <button className="admin-action-btn edit" onClick={() => handleUpdateItem(editingItem)}>
                                                        <i className="fas fa-save"></i>
                                                    </button>
                                                ) : (
                                                    <button className="admin-action-btn edit" onClick={() => setEditingItem(item)}>
                                                        <i className="fas fa-edit"></i>
                                                    </button>
                                                )}
                                                <button className="admin-action-btn delete" onClick={() => handleDeleteItem(item.id)}>
                                                    <i className="fas fa-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'gallery' && (
                            <div className="admin-panel">
                                <h3 style={{color: 'var(--luxury-gold)', marginBottom: '20px'}}>Gallery Manager</h3>
                                <div style={{display: 'flex', gap: '10px', marginBottom: '30px'}}>
                                    <input 
                                        value={newGalleryUrl}
                                        onChange={e => setNewGalleryUrl(e.target.value)}
                                        placeholder="Enter image URL"
                                        style={{flex: 1, padding: '12px', background: 'var(--dark-black)', border: '1px solid rgba(212,175,55,0.3)', color: '#fff', borderRadius: '8px'}}
                                    />
                                    <button className="admin-btn" onClick={handleAddGallery}>
                                        <i className="fas fa-plus"></i> Add
                                    </button>
                                </div>
                                <div className="gallery-grid">
                                    {galleryImages.map((img, index) => (
                                        <div key={index} style={{position: 'relative'}}>
                                            <img src={img} alt={`Gallery ${index}`} style={{width: '100%', borderRadius: '10px'}} />
                                            <button 
                                                onClick={() => handleDeleteGallery(index)}
                                                style={{
                                                    position: 'absolute', top: '10px', right: '10px',
                                                    background: 'var(--rich-red)', color: '#fff', border: 'none',
                                                    borderRadius: '50%', width: '35px', height: '35px', cursor: 'pointer'
                                                }}
                                            >
                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="admin-panel">
                                <h3 style={{color: 'var(--luxury-gold)', marginBottom: '20px'}}>Website Settings</h3>
                                <div className="admin-form-group">
                                    <label>Hero Title</label>
                                    <input value={siteSettings.heroTitle} onChange={e => setSiteSettings({...siteSettings, heroTitle: e.target.value})} />
                                </div>
                                <div className="admin-form-group">
                                    <label>Sinhala Subtitle</label>
                                    <input value={siteSettings.heroSubtitleSi} onChange={e => setSiteSettings({...siteSettings, heroSubtitleSi: e.target.value})} />
                                </div>
                                <div className="admin-form-group">
                                    <label>English Subtitle</label>
                                    <input value={siteSettings.heroSubtitleEn} onChange={e => setSiteSettings({...siteSettings, heroSubtitleEn: e.target.value})} />
                                </div>
                                <button className="admin-btn" onClick={() => alert('Settings saved!')}>
                                    <i className="fas fa-save"></i> Save Settings
                                </button>
                            </div>
                        )}

                        {activeTab === 'contact' && (
                            <div className="admin-panel">
                                <h3 style={{color: 'var(--luxury-gold)', marginBottom: '20px'}}>Contact Editor</h3>
                                <div className="admin-form-group">
                                    <label>Phone Number</label>
                                    <input value={siteSettings.phone} onChange={e => setSiteSettings({...siteSettings, phone: e.target.value})} />
                                </div>
                                <div className="admin-form-group">
                                    <label>WhatsApp Number</label>
                                    <input value={siteSettings.whatsapp} onChange={e => setSiteSettings({...siteSettings, whatsapp: e.target.value})} />
                                </div>
                                <div className="admin-form-group">
                                    <label>Facebook URL</label>
                                    <input value={siteSettings.facebook} onChange={e => setSiteSettings({...siteSettings, facebook: e.target.value})} />
                                </div>
                                <div className="admin-form-group">
                                    <label>Location</label>
                                    <input value={siteSettings.location} onChange={e => setSiteSettings({...siteSettings, location: e.target.value})} />
                                </div>
                                <button className="admin-btn" onClick={() => alert('Contact info saved!')}>
                                    <i className="fas fa-save"></i> Save Contact Info
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
